.aqua-btn {
  position: relative;
  width: 110px;
  height: 34px;
  padding: 0;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  overflow: visible;
  outline: none;

  background:
    linear-gradient(
      to bottom,
      rgba(110,110,110,0.45) 0%,
      rgba(45,45,45,0.35) 100%
    );

  border: 1px solid rgba(255,255,255,0.18);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.20),
    0 4px 8px rgba(0,0,0,0.20);

  transform: scale(1);
  transition:
    transform 0.12s ease,
    box-shadow 0.18s ease;
}

.aqua-btn::before {
  content: "";
  position: absolute;
  left: 8px;
  right: 8px;
  top: 4px;
  height: 14px;
  border-radius: 999px;

  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,0.28) 0%,
      rgba(255,255,255,0.10) 100%
    );

  pointer-events: none;
}

.aqua-btn::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;

  background:
    radial-gradient(
      circle at center,
      rgba(255,255,255,0.08) 0%,
      rgba(255,255,255,0) 70%
    );

  pointer-events: none;
}

.aqua-btn span {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.3px;

  color: rgba(255,255,255,0.92);

  z-index: 5;
}

.aqua-btn span::before {
  content: attr(data-text);
  position: absolute;
  color: rgba(0,0,0,0.45);
  filter: blur(4px);
  transform: translateY(4px);
  z-index: -1;
}

.aqua-btn .glow-1,
.aqua-btn .glow-2,
.aqua-btn .shine {
  display: none;
}

.aqua-btn .outer-glow {
  position: absolute;
  left: -16px;
  right: -16px;
  top: -6px;
  bottom: -14px;

  border-radius: 999px;

  background:
    radial-gradient(
      circle at center,
      rgba(0,0,0,0.18) 0%,
      rgba(0,0,0,0.08) 45%,
      rgba(0,0,0,0) 75%
    );

  filter: blur(12px);
  transform: translateY(6px);
  pointer-events: none;
  z-index: -1;
}

.aqua-btn:hover {
  transform: scale(1.03);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.25),
    0 4px 10px rgba(0,0,0,0.18);
}

.aqua-btn:hover {
  transform: scale(1.03);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.25),
    0 3px 8px rgba(0,0,0,0.15);
}

.aqua-btn:hover .outer-glow {
  opacity: 0.35;
}

.aqua-btn:active {
  transform: scale(0.97);
}

function renderLogo(size,type,callback){
 const svg=document.querySelector('svg');
 const canvas=document.createElement('canvas');
 canvas.width=size;
 canvas.height=size;
 const ctx=canvas.getContext('2d');

 const bg=getComputedStyle(document.body).backgroundColor;
 ctx.fillStyle=bg;
 ctx.fillRect(0,0,size,size);

 const svgClone=svg.cloneNode(true);
 svgClone.setAttribute('width',size);
 svgClone.setAttribute('height',size);

 const serializer=new XMLSerializer();
 const svgString=serializer.serializeToString(svgClone);
 const blob=new Blob([svgString],{type:'image/svg+xml;charset=utf-8'});
 const url=URL.createObjectURL(blob);
 const img=new Image();

 img.onload=function(){
   ctx.drawImage(img,0,0,size,size);
   URL.revokeObjectURL(url);
   callback(canvas.toDataURL(type,0.95));
 };

 img.src=url;
}

function downloadLogo(){
 const size=parseInt(document.getElementById('exportSize').value,10);
 const type=document.getElementById('exportType').value;
 const ext=type==='image/jpeg'?'jpg':'png';

 renderLogo(size,type,function(dataUrl){
   const link=document.createElement('a');
   link.download=`liveit-circle-${size}.${ext}`;
   link.href=dataUrl;
   link.click();
 });
}

function downloadApplePack(){

 ];

     });
   },index*250);
 });
}
